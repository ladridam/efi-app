<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EFI English</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <span class="logo-icon">E</span>
                <span class="logo-text">EFI English</span>
            </div>
            <h1>Welcome back</h1>
            <p class="subtitle">Enter your code to continue</p>
            
            <input type="text" id="studentCode" class="input-field" placeholder="Code (e.g., EFI-001)" autocomplete="off">
            <button id="loginBtn" class="btn btn-primary">Continue →</button>
            
            <p class="helper-text">Ask your teacher for your code</p>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
